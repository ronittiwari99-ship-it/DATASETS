<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPhone Landing Page</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 40px;
      background: rgba(0,0,0,0.8);
      position: sticky;
      top: 0;
    }

    .navbar h2 {
      font-weight: 500;
    }

    .navbar a {
      color: #ccc;
      text-decoration: none;
      margin-left: 20px;
    }

    .navbar a:hover {
      color: white;
    }

    /* Hero Section */
    .hero {
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 50px;
      font-weight: 600;
    }

    .hero p {
      color: #aaa;
      font-size: 18px;
    }

    .hero img {
      width: 300px;
      margin-top: 30px;
    }

    /* Features */
    .features {
      display: flex;
      justify-content: space-around;
      padding: 50px 20px;
      flex-wrap: wrap;
    }

    .feature {
      width: 250px;
      margin: 20px;
    }

    .feature h3 {
      font-size: 20px;
    }

    .feature p {
      color: #aaa;
    }

    /* Button */
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: white;
      color: black;
      border-radius: 20px;
      text-decoration: none;
    }

    .btn:hover {
      background: #ddd;
    }

    /* Footer */
    .footer {
      padding: 20px;
      background: #111;
      color: #888;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <h2> iPhone</h2>
    <div>
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Buy</a>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <h1>iPhone 15 Pro</h1>
    <p>Titanium. So strong. So light. So Pro.</p>
    <a href="#" class="btn">Buy Now</a>
    <br>
    <img src="https://via.placeholder.com/300" alt="iPhone">
  </div>

  <!-- Features -->
  <div class="features">
    <div class="feature">
      <h3>A17 Pro Chip</h3>
      <p>Superfast performance for gaming and apps.</p>
    </div>

    <div class="feature">
      <h3>48MP Camera</h3>
      <p>Capture stunning photos and videos.</p>
    </div>

    <div class="feature">
      <h3>All-Day Battery</h3>
      <p>Power that lasts all day long.</p>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <p>© 2026 Apple Inspired Design</p>
  </div>

</body>
</html>
